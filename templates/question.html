<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Question</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; padding: 20px; max-width: 600px; margin: auto; }
input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; }
button { padding: 12px; font-size: 16px; cursor: pointer; width: 100%; }
@media (max-width: 600px) { body { margin: 10px; padding: 10px; } input, button { font-size: 18px; } }
</style>
</head>
<body>
  <h1>{{ category }} ${{ question.value }}</h1>
  {% if daily %}
    <p>Daily Double!</p>
  {% endif %}
  {% if question.photo %}
    <img src="{{ url_for('thumbnail', filename=question.photo) }}" alt="photo clue" style="max-width:100%;height:auto;margin:10px 0;">
  {% endif %}
  <form method="post">
    <p>{{ question.clue }}</p>
    {% if daily %}
      <label>Wager: <input type="number" name="wager" min="0" max="{{ current_player.score }}" required></label><br>
    {% endif %}
    <label>Answer: <input name="answer" spellcheck="false" required></label><br>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
